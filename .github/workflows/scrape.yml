name: Daily Pizza Price Scrape

on:
  schedule:
    # 14:00 UTC ≈ 17:00 Israel (IDT, summer) / 16:00 (IST, winter). GitHub often
    # fires cron LATE (sometimes hours), so we deliberately DON'T enforce an
    # exact local hour anymore — a delayed evening run is fine (Domino's is open
    # from late morning to ~1am). One cron = one run/day; concurrency guards it.
    # NOTE: the geo-blocked chains (Pais Plus, Wolt) can't run on GitHub's US
    # runners — use run_daily.bat on an Israeli-IP machine for those.
    - cron: '0 14 * * *'
  workflow_dispatch: {}
  repository_dispatch:
    types: [manual-refresh]

permissions:
  contents: write

# Only one scrape at a time — prevents parallel manual + scheduled runs.
concurrency:
  group: pizza-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      # Service-account JSON for writing to Firestore (repo secret).
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      # Which Wolt venue to track (repo variable). Empty = skip Wolt.
      WOLT_VENUE_URL: ${{ vars.WOLT_VENUE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium chrome
          sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run scraper
        run: xvfb-run -a python multi_scraper.py

      - name: Run branch-count scraper
        run: python branch_scraper.py

      - name: Commit updated data
        run: |
          git config user.name "pizza-price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/all_prices.json data/branch_counts.json
          git diff --quiet --cached || git commit -m "Update daily price + branch data [skip ci]"
          git push
