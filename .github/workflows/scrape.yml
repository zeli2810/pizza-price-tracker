name: Daily Pizza Price Scrape

on:
  schedule:
    # Cron is UTC-only; Israel is UTC+3 in summer (IDT) and UTC+2 in winter (IST).
    # Both crons fire; the "check time" step below skips whichever one isn't
    # actually 14:00 Israel local time, so only one real run happens per day.
    - cron: '0 11 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch: {}
  repository_dispatch:
    types: [manual-refresh]

permissions:
  contents: write

# Only one scrape at a time — prevents parallel manual + scheduled runs.
concurrency:
  group: pizza-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      # Service-account JSON for writing to Firestore (repo secret).
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      # Which Wolt venue to track (repo variable). Empty = skip Wolt.
      WOLT_VENUE_URL: ${{ vars.WOLT_VENUE_URL }}
    steps:
      - name: Check it's actually 14:00 Israel time
        if: github.event_name == 'schedule'
        run: |
          HOUR=$(TZ=Asia/Jerusalem date +%H)
          if [ "$HOUR" != "14" ]; then
            echo "Not 14:00 Israel time (it's $HOUR:00 there) - skipping this trigger."
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.SKIP != 'true'

      - uses: actions/setup-python@v5
        if: env.SKIP != 'true'
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: env.SKIP != 'true'
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium chrome
          sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run scraper
        if: env.SKIP != 'true'
        run: xvfb-run -a python multi_scraper.py

      - name: Commit updated price data
        if: env.SKIP != 'true'
        run: |
          git config user.name "pizza-price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/all_prices.json
          git diff --quiet --cached || git commit -m "Update daily price data [skip ci]"
          git push
