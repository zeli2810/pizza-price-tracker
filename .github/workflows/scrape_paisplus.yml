name: Daily Pais Plus Pizza Offers Scrape

on:
  schedule:
    # Best-effort ~17:00 Israel (GitHub cron fires late; no strict hour check).
    # NOTE: Pais Plus + Wolt block non-Israeli IPs, so this CI run almost always
    # gets 0 / a degraded result and the scrapers keep the existing data. The
    # RELIABLE path for these two is run_daily.bat on an Israeli-IP machine.
    - cron: '0 14 * * *'
  workflow_dispatch: {}
  repository_dispatch:
    types: [manual-refresh-paisplus]

permissions:
  contents: write

concurrency:
  group: pizza-scrape-paisplus
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium chrome

      - name: Run Pais Plus scraper
        run: python paisplus_scraper.py

      - name: Run Wolt scraper
        run: python wolt_scraper.py || true

      - name: Commit updated offers data
        run: |
          git config user.name "pizza-price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/paisplus/ data/wolt_offers.json
          git diff --quiet --cached || git commit -m "Update Pais Plus + Wolt offers [skip ci]"
          git push
